name: Notification Sw Monday

on:
  schedule:
    # At 16:11 AM on Monday, Moscow time (UTC+3)
    # Cron times are in UTC so adjust accordingly: 9 AM UTC+3 is 6 AM UTC
    - cron: '11 13 * * 1'
  workflow_dispatch:
      
jobs:
  notification-disc:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Send notification
      env:
        DISC: ${{ secrets.DISC }}
      run: |
        curl -F "payload_json={\"content\": \"🏊 🌊 Monday 18:45 🐬\"}" \
             $DISC
