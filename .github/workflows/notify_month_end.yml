name: Notification End of Month

on:
  schedule:
    # At 17:08 AM on the each day of the month, Moscow time (UTC+3)
    # Cron times are in UTC so adjust accordingly: 9 AM UTC+3 is 6 AM UTC
    - cron: '08 14 30,31 * *'
  workflow_dispatch:
      
jobs:
  notification-disc:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Send notification
      env:
        DISC: ${{ secrets.DISC }}
      run: |
        curl -F "payload_json={\"content\": \" Lounge 💼 + Transfer\"}" \
             $DISC
